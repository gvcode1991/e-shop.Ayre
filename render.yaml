services:
  - type: web
    name: ayre-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://e-shop-ayre.onrender.com
      - key: MONGODB_DB_NAME
        value: ayre-shop
      - key: MONGODB_URI
        sync: false
